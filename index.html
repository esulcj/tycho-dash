<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tycho Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['system-ui', 'sans-serif'] },
          colors: { accent: '#FD384E' }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-white min-w-[375px]">
  <div x-cloak x-data="dashboard()" x-init="init()">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-10">
      <div class="max-w-2xl mx-auto flex items-center justify-between">
        <h1 class="text-lg font-bold text-gray-900">Tycho</h1>
        <div class="flex items-center gap-2 text-xs text-gray-400">
          <span x-text="timeAgo(d.timestamp)"></span>
          <button @click="refresh()" class="p-1 hover:text-gray-600" title="Refresh">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-4 space-y-4">

      <!-- Costs -->
      <section class="bg-white rounded-xl border border-gray-200 p-4">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Costs</h2>
        <div class="flex items-baseline justify-between mb-2">
          <span class="text-2xl font-bold text-gray-900">$<span x-text="fmt(d.costs.today)"></span></span>
          <span class="text-sm text-gray-400">/ $<span x-text="fmt(d.costs.dailyLimit)"></span></span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
          <div class="h-full rounded-full transition-all"
               :class="costColor(d.costs.today, d.costs.dailyLimit)"
               :style="'width:' + Math.min(100, (d.costs.today / d.costs.dailyLimit) * 100) + '%'"></div>
        </div>
        <p class="text-xs text-gray-400 mt-2">Session: $<span x-text="fmt(d.costs.session)"></span></p>
      </section>

      <!-- Sessions -->
      <section class="bg-white rounded-xl border border-gray-200 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Sessions</h2>
          <span class="text-sm font-medium text-gray-900" x-text="d.sessions.active + ' active'"></span>
        </div>
        <ul class="space-y-2">
          <template x-for="s in d.sessions.list" :key="s.channel">
            <li class="flex items-center justify-between text-sm">
              <span class="text-gray-700 font-medium" x-text="s.channel"></span>
              <span class="text-gray-400 text-xs"><span x-text="s.turns"></span> turns · <span x-text="s.age"></span></span>
            </li>
          </template>
        </ul>
      </section>

      <!-- Emails -->
      <section class="bg-white rounded-xl border border-gray-200 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Email</h2>
          <template x-if="d.emails.unread > 0">
            <span class="inline-flex items-center gap-1 bg-red-50 text-accent text-xs font-semibold px-2 py-0.5 rounded-full">
              <span x-text="d.emails.unread"></span> unread
              <template x-if="isOlderThan24h(d.emails.oldest)"><span>⚠️</span></template>
            </span>
          </template>
        </div>
        <ul class="space-y-1.5">
          <template x-for="(item, i) in d.emails.items" :key="i">
            <li class="text-sm text-gray-600 truncate" x-text="item"></li>
          </template>
        </ul>
        <template x-if="d.emails.items.length === 0">
          <p class="text-sm text-gray-400">No emails</p>
        </template>
      </section>

      <!-- Deploys -->
      <section class="bg-white rounded-xl border border-gray-200 p-4">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Deploys</h2>
        <ul class="space-y-2">
          <template x-for="dep in d.deploys" :key="dep.name">
            <li class="flex items-center justify-between text-sm">
              <div class="flex items-center gap-2">
                <span x-text="deployIcon(dep)" class="text-base"></span>
                <span class="text-gray-700" x-text="dep.name"></span>
              </div>
              <span class="text-xs text-gray-400" x-text="dep.code || '—'"></span>
            </li>
          </template>
        </ul>
      </section>

      <!-- Gas Town -->
      <section class="bg-white rounded-xl border border-gray-200 p-4">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Gas Town</h2>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div>
            <p class="text-gray-400 text-xs">Daemon</p>
            <p class="font-medium" :class="d.gastown.daemon === 'running' ? 'text-green-600' : 'text-gray-500'" x-text="d.gastown.daemon"></p>
          </div>
          <div>
            <p class="text-gray-400 text-xs">Rigs</p>
            <p class="font-medium text-gray-900" x-text="d.gastown.rigs"></p>
          </div>
          <div class="col-span-2">
            <p class="text-gray-400 text-xs">Last Build</p>
            <p class="font-medium text-gray-900" x-text="d.gastown.lastBuild"></p>
          </div>
        </div>
      </section>

      <!-- System -->
      <section class="bg-white rounded-xl border border-gray-200 p-4">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">System</h2>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div>
            <p class="text-gray-400 text-xs">Uptime</p>
            <p class="font-medium text-gray-900" x-text="d.system.uptime"></p>
          </div>
          <div>
            <p class="text-gray-400 text-xs">Disk Free</p>
            <p class="font-medium text-gray-900" x-text="d.system.diskFree"></p>
          </div>
          <div>
            <p class="text-gray-400 text-xs">Gateway PID</p>
            <p class="font-medium text-gray-900" x-text="d.system.gatewayPid"></p>
          </div>
          <div>
            <p class="text-gray-400 text-xs">Sessions</p>
            <p class="font-medium text-gray-900" x-text="d.system.sessionCount"></p>
          </div>
        </div>
      </section>

    </main>

    <!-- Error banner -->
    <template x-if="error">
      <div class="fixed bottom-4 left-4 right-4 max-w-2xl mx-auto bg-red-50 border border-red-200 text-accent text-sm rounded-lg px-4 py-2 text-center" x-text="error"></div>
    </template>

  </div>

  <script>
    function dashboard() {
      return {
        d: {
          timestamp: '',
          costs: { today: 0, session: 0, dailyLimit: 1 },
          sessions: { active: 0, list: [] },
          emails: { unread: 0, oldest: '', items: [] },
          deploys: [],
          gastown: { daemon: '?', rigs: 0, lastBuild: '?' },
          system: { uptime: '?', diskFree: '?', gatewayPid: '?', sessionCount: 0 }
        },
        error: null,

        async init() {
          await this.refresh();
          setInterval(() => this.refresh(), 30000);
        },

        async refresh() {
          try {
            const res = await fetch('status.json?t=' + Date.now());
            if (!res.ok) throw new Error('Failed to load status.json');
            this.d = await res.json();
            this.error = null;
          } catch (e) {
            this.error = e.message;
          }
        },

        fmt(n) {
          return n != null ? Number(n).toFixed(2) : '?';
        },

        costColor(today, limit) {
          const pct = today / limit;
          if (pct >= 0.8) return 'bg-red-500';
          if (pct >= 0.5) return 'bg-yellow-400';
          return 'bg-green-500';
        },

        deployIcon(dep) {
          const code = dep.code || 0;
          return (code >= 200 && code < 400) ? '✅' : '❌';
        },

        isOlderThan24h(oldest) {
          if (!oldest) return false;
          const m = oldest.match(/(\d+)([dhm])/);
          if (!m) return false;
          const val = parseInt(m[1]);
          const unit = m[2];
          if (unit === 'd' && val >= 1) return true;
          if (unit === 'h' && val >= 24) return true;
          return false;
        },

        timeAgo(ts) {
          if (!ts) return '—';
          const diff = Date.now() - new Date(ts).getTime();
          const mins = Math.floor(diff / 60000);
          if (mins < 1) return 'just now';
          if (mins < 60) return mins + 'm ago';
          const hrs = Math.floor(mins / 60);
          if (hrs < 24) return hrs + 'h ago';
          return Math.floor(hrs / 24) + 'd ago';
        }
      };
    }
  </script>
</body>
</html>
